name: Build DXC macOS arm64

on:
  workflow_dispatch:
    inputs:
      dxc_ref:
        description: "DXC ref (branch/tag)"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build DXC (macOS arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout DXC (upstream)
        uses: actions/checkout@v4
        with:
          repository: ksgfk/DirectXShaderCompiler
          ref: ${{ inputs.dxc_ref || 'main' }}
          fetch-depth: 0
          submodules: true
          path: dxc

      - name: Build
        id: build
        run: |
          bash ./build_macos_arm64.sh --project-dir "$GITHUB_WORKSPACE/dxc" --config Release

      - name: Show artifact path
        if: always()
        run: |
          echo "Artifact from build step: ${{ steps.build.outputs.artifact }}"

      - name: Upload artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dxc-macos-arm64
          path: artifacts/dxc-Release
          retention-days: 1
