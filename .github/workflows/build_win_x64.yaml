name: Build DXC Windows x64

on:
  workflow_dispatch:
    inputs:
      dxc_ref:
        description: "DXC ref (branch/tag)"
        required: true
        default: "main"
        type: string
      release_tag:
        description: "GitHub Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-win-x64:
    name: Build DXC (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout DXC (upstream)
        uses: actions/checkout@v4
        with:
          repository: ksgfk/DirectXShaderCompiler
          ref: ${{ inputs.dxc_ref || 'main' }}
          fetch-depth: 0
          submodules: true
          path: dxc

      - name: Build
        id: build
        shell: pwsh
        run: |
          .\build_win_x64.ps1 -ProjectDir "$env:GITHUB_WORKSPACE\dxc" -Config Release

      - name: Show artifact path
        if: always()
        shell: pwsh
        env:
          ARTIFACT_PATH: ${{ steps.build.outputs.artifact }}
        run: |
          Write-Host "Artifact from build step: $env:ARTIFACT_PATH"

      - name: Validate release asset path
        if: success()
        id: release_asset
        shell: pwsh
        env:
          ARTIFACT_PATH: ${{ steps.build.outputs.artifact }}
        run: |
          $artifact = $env:ARTIFACT_PATH
          if ([string]::IsNullOrWhiteSpace($artifact)) {
            throw "Build output 'artifact' is empty."
          }
          if (-not (Test-Path -LiteralPath $artifact -PathType Leaf)) {
            throw "Release asset not found: $artifact"
          }

          $normalized = $artifact -replace '\\', '/'
          "asset_path=$normalized" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: ${{ steps.release_asset.outputs.asset_path }}
          overwrite_files: true
          generate_release_notes: true

      - name: Upload artifact (backup)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dxc-windows-x64
          path: artifacts/dxc-Release
          retention-days: 1
